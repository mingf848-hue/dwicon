<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>队伍图标生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #333;
    }
    
    .container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 30px;
      margin-top: 40px;
      text-align: center;
    }
    
    h1 {
      color: #2c3e50;
      margin-bottom: 25px;
      font-size: 28px;
      position: relative;
      padding-bottom: 15px;
    }
    
    h1:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 4px;
      background: linear-gradient(to right, #42a5f5, #1e88e5);
      border-radius: 2px;
    }
    
    #drop-area {
      border: 3px dashed #90caf9;
      background-color: #e3f2fd;
      padding: 40px 20px;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-size: 18px;
      color: #1976d2;
      margin-bottom: 30px;
      position: relative;
      cursor: pointer;
    }
    
    #drop-area.highlight {
      background-color: #bbdefb;
      border-color: #42a5f5;
      transform: scale(1.02);
    }
    
    #drop-area p {
      margin-bottom: 15px;
    }
    
    .browse-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #42a5f5;
      color: white;
      border-radius: 6px;
      font-weight: 500;
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .browse-btn:hover {
      background: #1e88e5;
      transform: translateY(-2px);
    }
    
    #file-input {
      display: none;
    }
    
    .preview-area {
      margin: 30px 0;
    }
    
    canvas {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background-color: #fafafa;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
    }
    
    #download-btn {
      display: none;
      margin: 25px auto 0;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 500;
      background: linear-gradient(to right, #42a5f5, #1e88e5);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
    }
    
    #download-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(66, 165, 245, 0.4);
    }
    
    .loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      z-index: 10;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e3f2fd;
      border-top: 4px solid #42a5f5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .hint {
      color: #7f8c8d;
      font-size: 14px;
      margin-top: 10px;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      #drop-area {
        padding: 30px 15px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
        进入场馆长按队伍图标拖拽到下方<br>
        右键复制下方修改后的图片，F3，右键保存到桌面<br>
        如图片被锁定，再次覆盖保存即可
    </h1>

    
    <div id="drop-area">
      <div class="loading">
        <div class="spinner"></div>
      </div>
      <p>拖放图片</p>
      <div class="browse-btn">或选择文件</div>
      <input type="file" id="file-input" accept="image/*">
    </div>
    
    <div class="preview-area">
      <canvas id="canvas" width="150" height="150"></canvas>
    </div>
    
    <button id="download-btn">下载图标</button>
    
    <p class="hint">支持本地图片和网页图片拖放</p>
  </div>

  <script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const downloadBtn = document.getElementById('download-btn');
    const loading = document.querySelector('.loading');
    const browseBtn = document.querySelector('.browse-btn');

    // 点击浏览按钮触发文件选择
    browseBtn.addEventListener('click', () => {
      fileInput.click();
    });

    // 阻止默认拖拽行为
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, e => e.preventDefault());
    });

    // 拖拽区域高亮效果
    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => {
        dropArea.classList.add('highlight');
      });
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => {
        dropArea.classList.remove('highlight');
      });
    });

    // 处理拖放事件
    dropArea.addEventListener('drop', e => {
      const dt = e.dataTransfer;
      
      // 处理拖拽的文件
      if (dt.files && dt.files.length > 0) {
        handleFile(dt.files[0]);
      } 
      // 处理拖拽的网页图片
      else if (dt.items && dt.items.length > 0) {
        for (let i = 0; i < dt.items.length; i++) {
          if (dt.items[i].kind === 'file') {
            const file = dt.items[i].getAsFile();
            if (file && file.type.startsWith('image/')) {
              handleFile(file);
              return;
            }
          } else if (dt.items[i].kind === 'string' && dt.items[i].type.match('^text/uri-list')) {
            dt.items[i].getAsString(url => {
              loadImageFromUrl(url);
            });
            return;
          }
        }
        alert('请拖入有效的图片文件或网页图片');
      } else {
        alert('请拖入有效的图片文件或网页图片');
      }
    });

    // 处理文件选择
    fileInput.addEventListener('change', e => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    // 处理文件
    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('请选择图片文件 (JPG, PNG, GIF)');
        return;
      }
      
      showLoading(true);
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          processImage(img);
          showLoading(false);
        };
        img.onerror = function() {
          alert('图片加载失败，请重试');
          showLoading(false);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // 从URL加载图片
    function loadImageFromUrl(url) {
      showLoading(true);
      
      const img = new Image();
      img.crossOrigin = "Anonymous"; // 处理跨域问题
      
      img.onload = function() {
        processImage(img);
        showLoading(false);
      };
      
      img.onerror = function() {
        alert('图片加载失败，请检查URL或尝试其他图片');
        showLoading(false);
      };
      
      img.src = url;
    }

    // 处理图片
    function processImage(img) {
      // 清除画布
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 计算缩放比例
      const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
      const width = img.width * scale;
      const height = img.height * scale;
      
      // 居中绘制图片
      const x = (canvas.width - width) / 2;
      const y = (canvas.height - height) / 2;
      ctx.drawImage(img, x, y, width, height);
      
      // 启用下载按钮
      downloadBtn.style.display = 'block';
    }

    // 下载按钮事件
    downloadBtn.addEventListener('click', function() {
      // 创建临时链接进行下载
      const link = document.createElement('a');
      link.download = 'team-icon-' + new Date().getTime() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // 显示加载状态
    function showLoading(show) {
      loading.style.display = show ? 'flex' : 'none';
    }
